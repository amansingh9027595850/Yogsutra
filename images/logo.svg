    <!-- Upper Left Petal -->
    <path d="M 250,165 C 225,145 185,165 165,200 C 155,220 175,235 210,240 C 235,243 250,230 255,220" />
    
    <!-- Upper Right Petal -->
    <path d="M 350,165 C 375,145 415,165 435,200 C 445,220 425,235 390,240 C 365,243 350,230 345,220" />
    
    <!-- Lower Left Petal -->
    <path d="M 220,235 C 175,215 135,235 135,260 C 135,285 185,285 230,270" />
    
    <!-- Lower Right Petal -->
    <path d="M 380,235 C 425,215 465,235 465,260 C 465,285 415,285 370,270" />
  </g>
  
  <!-- Typography -->
  <text x="300" y="360" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="46" font-weight="700" fill="#f37021" letter-spacing="1">Yogsutra Yogshala</text>
  <text x="300" y="405" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-size="16" font-weight="600" fill="#f37021" letter-spacing="8">DISCIPLINE . BALANCE . BLISS</text>
</svg>
