<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <!-- Lotus Icon -->
  <g fill="none" stroke="#f37021" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Yogi Head -->
    <circle cx="300" cy="110" r="14" fill="#f37021" stroke="none" />
    
    <!-- Torso / Arms -->
    <path d="M 278,145 C 266,165 266,195 282,215 C 285,220 288,225 292,232" />
    <path d="M 322,145 C 334,165 334,195 318,215 C 315,220 312,225 308,232" />
    
    <!-- Crossed Legs (Base) -->
    <path d="M 230,265 C 250,290 350,290 370,265 C 390,245 350,245 300,245 C 250,245 210,245 230,265 Z" fill="none" stroke-width="12" />

    <!-- Center Petal Outline (background frame) -->
